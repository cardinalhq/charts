suite: test image configuration
values:
  - ../values.yaml
templates:
  - mcp-gateway-deployment.yaml
  - conductor-server-deployment.yaml
  - maestro-server-deployment.yaml
tests:
  - it: mcp-gateway should use default image and tag
    templates:
      - mcp-gateway-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "public.ecr.aws/cardinalhq.io/maestro:v0.7.8"

  - it: mcp-gateway should use custom image tag
    set:
      mcpGateway.image.tag: "v1.0.0"
    templates:
      - mcp-gateway-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "public.ecr.aws/cardinalhq.io/maestro:v1.0.0"

  - it: conductor-server should use default image and tag
    templates:
      - conductor-server-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "public.ecr.aws/cardinalhq.io/conductor-server:v0.1.28"

  - it: maestro-server should use default image and tag
    templates:
      - maestro-server-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "public.ecr.aws/cardinalhq.io/maestro:v0.1.0"

  - it: mcp-gateway should use entrypoint command
    templates:
      - mcp-gateway-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].command
          value: ["/app/entrypoint.sh"]
      - equal:
          path: spec.template.spec.containers[0].args
          value: ["mcp-gateway"]
