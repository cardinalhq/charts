suite: test secrets configuration
values:
  - ../values.yaml
templates:
  - secrets.yaml
  - mcp-gateway-deployment.yaml
  - conductor-server-deployment.yaml
  - maestro-server-deployment.yaml
tests:
  # MCP Gateway secrets
  - it: should create mcp-gateway secret when create is true
    set:
      mcpGateway.secrets.create: true
      mcpGateway.secrets.secretName: "mcp-gateway-secrets"
      mcpGateway.secrets.data.MCP_API_KEY: "test-key"
    templates:
      - secrets.yaml
    asserts:
      - isKind:
          of: Secret
        documentIndex: 0
      - equal:
          path: metadata.name
          value: RELEASE-NAME-conductor-server-mcp-gateway-secrets
        documentIndex: 0
      - equal:
          path: data.MCP_API_KEY
          value: "dGVzdC1rZXk="
        documentIndex: 0

  - it: should not create mcp-gateway secret when create is false
    set:
      mcpGateway.secrets.create: false
      conductorServer.secrets.create: false
      conductorServer.llmSecrets.create: false
    templates:
      - secrets.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should use bare secret name in envFrom when create is false
    set:
      mcpGateway.secrets.create: false
      mcpGateway.secrets.secretName: "existing-mcp-secret"
    templates:
      - mcp-gateway-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: existing-mcp-secret

  - it: should use prefixed secret name in envFrom when create is true
    set:
      mcpGateway.secrets.create: true
      mcpGateway.secrets.secretName: "mcp-gateway-secrets"
    templates:
      - mcp-gateway-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: RELEASE-NAME-conductor-server-mcp-gateway-secrets

  # Conductor secrets
  - it: should create conductor secret when create is true
    set:
      conductorServer.secrets.create: true
      conductorServer.secrets.secretName: "conductor-server-secrets"
      conductorServer.secrets.data.MCP_API_KEY: "test-key"
    templates:
      - secrets.yaml
    asserts:
      - isKind:
          of: Secret
        documentIndex: 1
      - matchRegex:
          path: metadata.name
          pattern: ".*conductor-server-secrets"
        documentIndex: 1

  - it: should reference existing conductor secret when create is false
    set:
      conductorServer.secrets.create: false
      conductorServer.secrets.secretName: "my-existing-secret"
    templates:
      - conductor-server-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[1].valueFrom.secretKeyRef.name
          value: my-existing-secret

  # LLM secrets
  - it: should create llm secret when create is true
    set:
      conductorServer.llmSecrets.create: true
      conductorServer.llmSecrets.data.OPENAI_API_KEY: "sk-test"
    templates:
      - secrets.yaml
    asserts:
      - isKind:
          of: Secret
        documentIndex: 2

  - it: should reference existing llm secret when create is false
    set:
      conductorServer.llmSecrets.create: false
      conductorServer.llmSecrets.secretName: "my-llm-keys"
    templates:
      - conductor-server-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[0].valueFrom.secretKeyRef.name
          value: my-llm-keys

  # Maestro reuses conductor secrets by default
  - it: should reference conductor secrets from maestro by default
    templates:
      - maestro-server-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[1].valueFrom.secretKeyRef.name
          value: conductor-server-secrets
