suite: test environment variables
values:
  - ../values.yaml
templates:
  - conductor-server-deployment.yaml
  - maestro-server-deployment.yaml
  - mcp-gateway-deployment.yaml
tests:
  - it: conductor-server should have MCP_GATEWAY_URL pointing to mcp-gateway service
    templates:
      - conductor-server-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_GATEWAY_URL
            value: "http://RELEASE-NAME-conductor-server-mcp-gateway:8080"

  - it: maestro-server should have MCP_GATEWAY_URL pointing to mcp-gateway service
    templates:
      - maestro-server-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_GATEWAY_URL
            value: "http://RELEASE-NAME-conductor-server-mcp-gateway:8080"

  - it: conductor-server should have LLM config
    templates:
      - conductor-server-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: WORKFLOW_LLM_PROVIDER
            value: "bedrock"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AWS_REGION
            value: "us-east-2"

  - it: mcp-gateway should include LAKERUNNER_API_URL when set
    set:
      mcpGateway.lakerunnerApiUrl: "https://lakerunner.example.com"
    templates:
      - mcp-gateway-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LAKERUNNER_API_URL
            value: "https://lakerunner.example.com"

  - it: mcp-gateway should not include LAKERUNNER_API_URL when empty
    set:
      mcpGateway.lakerunnerApiUrl: ""
    templates:
      - mcp-gateway-deployment.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: LAKERUNNER_API_URL
          any: true

  - it: should inject global env vars
    set:
      global.env:
        - name: GLOBAL_VAR
          value: "global-value"
    templates:
      - conductor-server-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GLOBAL_VAR
            value: "global-value"

  - it: should inject component-specific env vars
    set:
      conductorServer.env:
        - name: CUSTOM_VAR
          value: "custom-value"
    templates:
      - conductor-server-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CUSTOM_VAR
            value: "custom-value"
