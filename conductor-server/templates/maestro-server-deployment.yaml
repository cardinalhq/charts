{{- if .Values.maestroServer.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "conductor-server.fullname" . }}-maestro-server
  labels:
    {{- include "conductor-server.labels" . | nindent 4 }}
    app.kubernetes.io/component: maestro-server
  {{- include "conductor-server.annotations" . | nindent 2 }}
spec:
  replicas: {{ .Values.maestroServer.replicas }}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      {{- include "conductor-server.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: maestro-server
  template:
    metadata:
      labels:
        {{- include "conductor-server.labels" . | nindent 8 }}
        app.kubernetes.io/component: maestro-server
      {{- include "conductor-server.annotations" . | nindent 6 }}
    spec:
      serviceAccountName: {{ include "conductor-server.maestroServer.serviceAccountName" . }}
      securityContext:
        runAsUser: 65532
        runAsGroup: 65532
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      {{- include "conductor-server.imagePullSecrets" . | nindent 6 }}
      containers:
      - name: maestro-server
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        image: {{ include "conductor-server.maestroServer.image" . }}
        imagePullPolicy: {{ .Values.maestroServer.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.maestroServer.port }}
          name: http
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.maestroServer.port }}
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.maestroServer.port }}
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        env:
          {{- include "conductor-server.maestroServer.databaseEnv" . | nindent 10 }}
          - name: OPENAI_API_KEY
            valueFrom:
              secretKeyRef:
                name: {{ include "conductor-server.maestroServer.llmSecretName" . }}
                key: OPENAI_API_KEY
          - name: LAKERUNNER_API_KEY
            valueFrom:
              secretKeyRef:
                name: {{ include "conductor-server.maestroServer.secretName" . }}
                key: LAKERUNNER_API_KEY
          - name: CARDINALHQ_API_KEY
            valueFrom:
              secretKeyRef:
                name: {{ include "conductor-server.maestroServer.secretName" . }}
                key: CARDINALHQ_API_KEY
          - name: MCP_API_KEY
            valueFrom:
              secretKeyRef:
                name: {{ include "conductor-server.maestroServer.secretName" . }}
                key: MCP_API_KEY
          - name: MCP_GATEWAY_URL
            value: "http://{{ include "conductor-server.fullname" . }}-mcp-gateway:{{ .Values.mcpGateway.port }}"
          - name: WORKFLOW_LLM_PROVIDER
            value: {{ .Values.maestroServer.llm.provider | quote }}
          - name: WORKFLOW_BEDROCK_INFERENCE_MODEL
            value: {{ .Values.maestroServer.llm.bedrockModel | quote }}
          - name: AWS_REGION
            value: {{ .Values.maestroServer.llm.awsRegion | quote }}
          {{- with .Values.global.env }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
          {{- with .Values.maestroServer.env }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        resources:
          {{- toYaml .Values.maestroServer.resources | nindent 10 }}
      {{- with .Values.maestroServer.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.maestroServer.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.maestroServer.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
