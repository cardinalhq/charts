{{- if .Values.mcpGateway.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "conductor-server.fullname" . }}-mcp-gateway
  labels:
    {{- include "conductor-server.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-gateway
  {{- include "conductor-server.annotations" . | nindent 2 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.mcpGateway.port }}
      targetPort: {{ .Values.mcpGateway.port }}
      name: mcp
      protocol: TCP
  selector:
    {{- include "conductor-server.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-gateway
{{- end }}
