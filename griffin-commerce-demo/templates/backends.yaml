{{- $root := . -}}
{{- range (include "griffin.backends" . | fromYamlArray) }}
{{- $svc := . }}
{{- $resources := $svc.resources | default (include "griffin.defaultBackendResources" $root | fromYaml) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $svc.name }}
  labels:
    {{- include "griffin.labels" $root | nindent 4 }}
    app: {{ $svc.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $svc.name }}
  template:
    metadata:
      labels:
        app: {{ $svc.name }}
    spec:
      {{- include "griffin.imagePullSecrets" $root | nindent 6 }}
      securityContext:
        {{- toYaml $root.Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ $svc.name }}
          image: {{ include "griffin.image" $root | quote }}
          imagePullPolicy: {{ $root.Values.image.pullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
          env:
            - name: SERVICE_NAME
              value: {{ $svc.name | quote }}
            - name: PORT
              value: {{ $svc.port | quote }}
            {{- with $svc.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- include "griffin.otelEnv" (dict "root" $root "name" $svc.name) | nindent 12 }}
            {{- include "griffin.chaosEnv" (dict "root" $root "name" $svc.name) | nindent 12 }}
          securityContext:
            {{- toYaml $root.Values.containerSecurityContext | nindent 12 }}
          resources:
            {{- toYaml $resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ $svc.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: {{ $svc.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $svc.name }}
  labels:
    {{- include "griffin.labels" $root | nindent 4 }}
    app: {{ $svc.name }}
spec:
  type: ClusterIP
  selector:
    app: {{ $svc.name }}
  ports:
    - port: {{ $svc.port }}
      targetPort: {{ $svc.port }}
{{- end }}
