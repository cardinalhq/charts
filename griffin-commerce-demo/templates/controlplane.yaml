{{- if .Values.chaos.enabled -}}
# Fault-injection control plane. Single-replica + Recreate by design — the
# active knob is held in memory; horizontal scale or a rolling-update window
# would split the single-knob-at-a-time invariant.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controlplane
  labels:
    {{- include "griffin.labels" . | nindent 4 }}
    app: controlplane
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: controlplane
  template:
    metadata:
      labels:
        app: controlplane
    spec:
      {{- include "griffin.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: controlplane
          image: {{ include "griffin.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8086
          env:
            - name: SERVICE_NAME
              value: "controlplane"
            - name: PORT
              value: "8086"
            - name: GRIFFIN_ADMIN_ENABLED
              value: "true"
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          resources:
            requests:
              memory: "64Mi"
              cpu: "20m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8086
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8086
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: controlplane
  labels:
    {{- include "griffin.labels" . | nindent 4 }}
    app: controlplane
spec:
  type: ClusterIP
  selector:
    app: controlplane
  ports:
    - port: 8086
      targetPort: 8086
{{- end }}
