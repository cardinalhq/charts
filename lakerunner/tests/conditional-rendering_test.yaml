suite: test conditional rendering
values:
  - ../values.yaml
set:
  cloudProvider.aws.region: us-west-2
  license.data: '{"key":"test"}'
templates:
  - setup-job.yaml
  - query-api-deployment.yaml
  - query-worker-deployment.yaml
  - grafana-deployment.yaml
  - process-logs-deployment.yaml
  - process-metrics-deployment.yaml
  - process-traces-deployment.yaml
  - control-plane-deployment.yaml
  - deprecation-warnings.yaml
  - pubsub-http-deployment.yaml
  - pubsub-sqs-deployment.yaml
  - pubsub-gcp-deployment.yaml
tests:
  - it: should render setup job when enabled
    set:
      setup.enabled: true
    templates:
      - setup-job.yaml
    asserts:
      - isKind:
          of: Job

  - it: should not render setup job when disabled
    set:
      setup.enabled: false
    templates:
      - setup-job.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should render query api when enabled
    set:
      queryApi.enabled: true
    templates:
      - query-api-deployment.yaml
    asserts:
      - isKind:
          of: Deployment

  - it: should not render query api when disabled
    set:
      queryApi.enabled: false
    templates:
      - query-api-deployment.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should render query worker when enabled
    set:
      queryWorker.enabled: true
    templates:
      - query-worker-deployment.yaml
    asserts:
      - isKind:
          of: Deployment

  - it: should not render query worker when disabled
    set:
      queryWorker.enabled: false
    templates:
      - query-worker-deployment.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should render grafana when enabled
    set:
      grafana.enabled: true
    templates:
      - grafana-deployment.yaml
    asserts:
      - isKind:
          of: Deployment

  - it: should not render grafana when disabled
    set:
      grafana.enabled: false
    templates:
      - grafana-deployment.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should render pubsub http when enabled
    set:
      pubsub.HTTP.enabled: true
    templates:
      - pubsub-http-deployment.yaml
    asserts:
      - isKind:
          of: Deployment

  - it: should not render pubsub http when disabled
    set:
      pubsub.HTTP.enabled: false
    templates:
      - pubsub-http-deployment.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should render pubsub sqs when enabled
    set:
      pubsub.SQS.enabled: true
      pubsub.SQS.queueURL: "https://sqs.us-east-2.amazonaws.com/123456789012/test-queue"
      pubsub.SQS.region: "us-east-2"
    templates:
      - pubsub-sqs-deployment.yaml
    asserts:
      - isKind:
          of: Deployment

  - it: should not render pubsub sqs when disabled
    set:
      pubsub.SQS.enabled: false
    templates:
      - pubsub-sqs-deployment.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should render GCP pubsub when enabled
    set:
      pubsub.GCP.enabled: true
      pubsub.GCP.projectID: "test-project"
      pubsub.GCP.subscriptionID: "test-subscription"
    templates:
      - pubsub-gcp-deployment.yaml
    asserts:
      - isKind:
          of: Deployment

  - it: should not render GCP pubsub when disabled
    set:
      pubsub.GCP.enabled: false
    templates:
      - pubsub-gcp-deployment.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should render all processing components when enabled
    set:
      processLogs.enabled: true
      processMetrics.enabled: true
      processTraces.enabled: true
    templates:
      - process-logs-deployment.yaml
      - process-metrics-deployment.yaml
      - process-traces-deployment.yaml
    asserts:
      - isKind:
          of: Deployment

  # sweeper and alert-evaluator are colocated in the control-plane pod; their
  # containers are always rendered as part of the control-plane Deployment.
  - it: should render sweeper and alert-evaluator containers in the control-plane deployment
    templates:
      - control-plane-deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.containers[?(@.name=="sweeper")].name
          value: sweeper
      - equal:
          path: spec.template.spec.containers[?(@.name=="alert-evaluator")].name
          value: alert-evaluator

  - it: should fail when legacy alertEvaluator.enabled is configured
    set:
      alertEvaluator.enabled: false
    templates:
      - deprecation-warnings.yaml
    asserts:
      - failedTemplate:
          errorPattern: "alertEvaluator.enabled"

  - it: should fail when notificationSender is still configured
    set:
      notificationSender.enabled: true
    templates:
      - deprecation-warnings.yaml
    asserts:
      - failedTemplate:
          errorPattern: "notificationSender has been removed"

  - it: should pass deprecation warnings with clean config
    templates:
      - deprecation-warnings.yaml
    asserts:
      - hasDocuments:
          count: 0
