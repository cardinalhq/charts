suite: test scaling configuration
templates:
  - query-api-deployment.yaml
  - process-logs-deployment.yaml
  - process-metrics-deployment.yaml
  - process-traces-deployment.yaml
  - control-plane-deployment.yaml
values:
  - ../values.yaml
set:
  cloudProvider.aws.region: us-west-2
  license.data: '{"key":"test"}'
  queryApi.enabled: true
  queryWorker.enabled: true
tests:
  - it: should set correct replicas for query api
    set:
      queryApi.enabled: true
      queryApi.replicas: 3
    templates:
      - query-api-deployment.yaml
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should not set replicas on autoscaled worker deployments
    set:
      processLogs.enabled: true
    templates:
      - process-logs-deployment.yaml
    asserts:
      - notExists:
          path: spec.replicas

  - it: should not set replicas for process metrics
    set:
      processMetrics.enabled: true
    templates:
      - process-metrics-deployment.yaml
    asserts:
      - notExists:
          path: spec.replicas

  - it: should not set replicas for process traces
    set:
      processTraces.enabled: true
    templates:
      - process-traces-deployment.yaml
    asserts:
      - notExists:
          path: spec.replicas

  # Autoscaler env var tests (on monitoring deployment)
  - it: should inject autoscaler env vars for enabled services
    set:
      monitoring.enabled: true
      processLogs.enabled: true
      processLogs.autoscaling.minReplicas: 1
      processLogs.autoscaling.maxReplicas: 10
    templates:
      - control-plane-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[?(@.name=="monitoring")].env
          content:
            name: LAKERUNNER_AUTOSCALER_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.containers[?(@.name=="monitoring")].env
          content:
            name: LAKERUNNER_AUTOSCALER_SERVICES_LOGS_DEPLOYMENT
            value: RELEASE-NAME-lakerunner-process-logs
      - contains:
          path: spec.template.spec.containers[?(@.name=="monitoring")].env
          content:
            name: LAKERUNNER_AUTOSCALER_SERVICES_LOGS_MIN_REPLICAS
            value: "1"
      - contains:
          path: spec.template.spec.containers[?(@.name=="monitoring")].env
          content:
            name: LAKERUNNER_AUTOSCALER_SERVICES_LOGS_MAX_REPLICAS
            value: "10"

  - it: should emit zero replicas for disabled traces
    set:
      monitoring.enabled: true
      processTraces.enabled: false
    templates:
      - control-plane-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[?(@.name=="monitoring")].env
          content:
            name: LAKERUNNER_AUTOSCALER_SERVICES_TRACES_DEPLOYMENT
            value: RELEASE-NAME-lakerunner-process-traces
      - contains:
          path: spec.template.spec.containers[?(@.name=="monitoring")].env
          content:
            name: LAKERUNNER_AUTOSCALER_SERVICES_TRACES_MIN_REPLICAS
            value: "0"
      - contains:
          path: spec.template.spec.containers[?(@.name=="monitoring")].env
          content:
            name: LAKERUNNER_AUTOSCALER_SERVICES_TRACES_MAX_REPLICAS
            value: "0"

  - it: should emit zero replicas for disabled logs
    set:
      monitoring.enabled: true
      processLogs.enabled: false
    templates:
      - control-plane-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[?(@.name=="monitoring")].env
          content:
            name: LAKERUNNER_AUTOSCALER_SERVICES_LOGS_DEPLOYMENT
            value: RELEASE-NAME-lakerunner-process-logs
      - contains:
          path: spec.template.spec.containers[?(@.name=="monitoring")].env
          content:
            name: LAKERUNNER_AUTOSCALER_SERVICES_LOGS_MIN_REPLICAS
            value: "0"
      - contains:
          path: spec.template.spec.containers[?(@.name=="monitoring")].env
          content:
            name: LAKERUNNER_AUTOSCALER_SERVICES_LOGS_MAX_REPLICAS
            value: "0"

  - it: should emit zero replicas for disabled metrics
    set:
      monitoring.enabled: true
      processMetrics.enabled: false
    templates:
      - control-plane-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[?(@.name=="monitoring")].env
          content:
            name: LAKERUNNER_AUTOSCALER_SERVICES_METRICS_DEPLOYMENT
            value: RELEASE-NAME-lakerunner-process-metrics
      - contains:
          path: spec.template.spec.containers[?(@.name=="monitoring")].env
          content:
            name: LAKERUNNER_AUTOSCALER_SERVICES_METRICS_MIN_REPLICAS
            value: "0"
      - contains:
          path: spec.template.spec.containers[?(@.name=="monitoring")].env
          content:
            name: LAKERUNNER_AUTOSCALER_SERVICES_METRICS_MAX_REPLICAS
            value: "0"

  - it: should override configured replica values when signal is disabled
    set:
      monitoring.enabled: true
      processTraces.enabled: false
      processTraces.autoscaling.minReplicas: 3
      processTraces.autoscaling.maxReplicas: 7
    templates:
      - control-plane-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[?(@.name=="monitoring")].env
          content:
            name: LAKERUNNER_AUTOSCALER_SERVICES_TRACES_MIN_REPLICAS
            value: "0"
      - contains:
          path: spec.template.spec.containers[?(@.name=="monitoring")].env
          content:
            name: LAKERUNNER_AUTOSCALER_SERVICES_TRACES_MAX_REPLICAS
            value: "0"

  - it: should emit all services with zero replicas when every signal is disabled
    set:
      monitoring.enabled: true
      processLogs.enabled: false
      processMetrics.enabled: false
      processTraces.enabled: false
    templates:
      - control-plane-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[?(@.name=="monitoring")].env
          content:
            name: LAKERUNNER_AUTOSCALER_SERVICES_LOGS_DEPLOYMENT
            value: RELEASE-NAME-lakerunner-process-logs
      - contains:
          path: spec.template.spec.containers[?(@.name=="monitoring")].env
          content:
            name: LAKERUNNER_AUTOSCALER_SERVICES_LOGS_MAX_REPLICAS
            value: "0"
      - contains:
          path: spec.template.spec.containers[?(@.name=="monitoring")].env
          content:
            name: LAKERUNNER_AUTOSCALER_SERVICES_METRICS_DEPLOYMENT
            value: RELEASE-NAME-lakerunner-process-metrics
      - contains:
          path: spec.template.spec.containers[?(@.name=="monitoring")].env
          content:
            name: LAKERUNNER_AUTOSCALER_SERVICES_METRICS_MAX_REPLICAS
            value: "0"
      - contains:
          path: spec.template.spec.containers[?(@.name=="monitoring")].env
          content:
            name: LAKERUNNER_AUTOSCALER_SERVICES_TRACES_DEPLOYMENT
            value: RELEASE-NAME-lakerunner-process-traces
      - contains:
          path: spec.template.spec.containers[?(@.name=="monitoring")].env
          content:
            name: LAKERUNNER_AUTOSCALER_SERVICES_TRACES_MAX_REPLICAS
            value: "0"

  - it: should set observe-only mode when configured
    set:
      monitoring.enabled: true
      monitoring.autoscaler.observeOnly: true
    templates:
      - control-plane-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[?(@.name=="monitoring")].env
          content:
            name: LAKERUNNER_AUTOSCALER_OBSERVE_ONLY
            value: "true"

  - it: should default to observe-only false
    set:
      monitoring.enabled: true
    templates:
      - control-plane-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[?(@.name=="monitoring")].env
          content:
            name: LAKERUNNER_AUTOSCALER_OBSERVE_ONLY
            value: "false"

  - it: should support pinning replicas with min equals max
    set:
      monitoring.enabled: true
      processLogs.enabled: true
      processLogs.autoscaling.minReplicas: 5
      processLogs.autoscaling.maxReplicas: 5
    templates:
      - control-plane-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[?(@.name=="monitoring")].env
          content:
            name: LAKERUNNER_AUTOSCALER_SERVICES_LOGS_MIN_REPLICAS
            value: "5"
      - contains:
          path: spec.template.spec.containers[?(@.name=="monitoring")].env
          content:
            name: LAKERUNNER_AUTOSCALER_SERVICES_LOGS_MAX_REPLICAS
            value: "5"

  - it: should support disabling autoscaling with min and max zero
    set:
      monitoring.enabled: true
      processLogs.enabled: true
      processLogs.autoscaling.minReplicas: 0
      processLogs.autoscaling.maxReplicas: 0
    templates:
      - control-plane-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[?(@.name=="monitoring")].env
          content:
            name: LAKERUNNER_AUTOSCALER_SERVICES_LOGS_MIN_REPLICAS
            value: "0"
      - contains:
          path: spec.template.spec.containers[?(@.name=="monitoring")].env
          content:
            name: LAKERUNNER_AUTOSCALER_SERVICES_LOGS_MAX_REPLICAS
            value: "0"
