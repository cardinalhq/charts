suite: test scaling configuration
templates:
  - query-api-deployment.yaml
  - ingest-logs-deployment.yaml
  - ingest-traces-deployment.yaml
  - compact-logs-deployment.yaml
  - compact-traces-deployment.yaml
  - monitoring-deployment.yaml
values:
  - ../values.yaml
set:
  cloudProvider.aws.region: us-west-2
  queryApi.enabled: true
  queryWorker.enabled: true
tests:
  - it: should set correct replicas for query api
    set:
      queryApi.enabled: true
      queryApi.replicas: 3
    templates:
      - query-api-deployment.yaml
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should always set replicas on worker deployments
    set:
      ingestLogs.enabled: true
      ingestLogs.replicas: 5
    templates:
      - ingest-logs-deployment.yaml
    asserts:
      - equal:
          path: spec.replicas
          value: 5

  - it: should set replicas for ingest traces
    set:
      ingestTraces.enabled: true
      ingestTraces.replicas: 4
    templates:
      - ingest-traces-deployment.yaml
    asserts:
      - equal:
          path: spec.replicas
          value: 4

  - it: should set replicas for compact logs
    set:
      compactLogs.enabled: true
      compactLogs.replicas: 3
    templates:
      - compact-logs-deployment.yaml
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should set replicas for compact traces
    set:
      compactTraces.enabled: true
      compactTraces.replicas: 2
    templates:
      - compact-traces-deployment.yaml
    asserts:
      - equal:
          path: spec.replicas
          value: 2

  # Autoscaler env var tests (on monitoring deployment)
  - it: should inject autoscaler env vars for enabled services
    set:
      monitoring.enabled: true
      ingestLogs.enabled: true
      ingestLogs.autoscaling.minReplicas: 1
      ingestLogs.autoscaling.maxReplicas: 10
    templates:
      - monitoring-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LAKERUNNER_AUTOSCALER_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LAKERUNNER_AUTOSCALER_SERVICES_INGEST_LOGS_DEPLOYMENT
            value: RELEASE-NAME-lakerunner-ingest-logs
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LAKERUNNER_AUTOSCALER_SERVICES_INGEST_LOGS_MIN_REPLICAS
            value: "1"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LAKERUNNER_AUTOSCALER_SERVICES_INGEST_LOGS_MAX_REPLICAS
            value: "10"

  - it: should not inject autoscaler env vars for disabled services
    set:
      monitoring.enabled: true
      ingestTraces.enabled: false
    templates:
      - monitoring-deployment.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: LAKERUNNER_AUTOSCALER_SERVICES_INGEST_TRACES_DEPLOYMENT
            value: RELEASE-NAME-lakerunner-ingest-traces

  - it: should set observe-only mode when configured
    set:
      monitoring.enabled: true
      monitoring.autoscaler.observeOnly: true
    templates:
      - monitoring-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LAKERUNNER_AUTOSCALER_OBSERVE_ONLY
            value: "true"

  - it: should default to observe-only false
    set:
      monitoring.enabled: true
    templates:
      - monitoring-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LAKERUNNER_AUTOSCALER_OBSERVE_ONLY
            value: "false"

  - it: should support pinning replicas with min equals max
    set:
      monitoring.enabled: true
      ingestLogs.enabled: true
      ingestLogs.autoscaling.minReplicas: 5
      ingestLogs.autoscaling.maxReplicas: 5
    templates:
      - monitoring-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LAKERUNNER_AUTOSCALER_SERVICES_INGEST_LOGS_MIN_REPLICAS
            value: "5"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LAKERUNNER_AUTOSCALER_SERVICES_INGEST_LOGS_MAX_REPLICAS
            value: "5"

  - it: should support disabling autoscaling with min and max zero
    set:
      monitoring.enabled: true
      ingestLogs.enabled: true
      ingestLogs.autoscaling.minReplicas: 0
      ingestLogs.autoscaling.maxReplicas: 0
    templates:
      - monitoring-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LAKERUNNER_AUTOSCALER_SERVICES_INGEST_LOGS_MIN_REPLICAS
            value: "0"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LAKERUNNER_AUTOSCALER_SERVICES_INGEST_LOGS_MAX_REPLICAS
            value: "0"
