suite: test scaling configuration
templates:
  - query-api-deployment.yaml
  - process-logs-deployment.yaml
  - process-metrics-deployment.yaml
  - process-traces-deployment.yaml
values:
  - ../values.yaml
set:
  cloudProvider.aws.region: us-west-2
  license.data: '{"key":"test"}'
  queryApi.enabled: true
  queryWorker.enabled: true
tests:
  - it: should set correct replicas for query api
    set:
      queryApi.enabled: true
      queryApi.replicas: 3
    templates:
      - query-api-deployment.yaml
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should not set replicas on autoscaled worker deployments
    set:
      processLogs.enabled: true
    templates:
      - process-logs-deployment.yaml
    asserts:
      - notExists:
          path: spec.replicas

  - it: should not set replicas for process metrics
    set:
      processMetrics.enabled: true
    templates:
      - process-metrics-deployment.yaml
    asserts:
      - notExists:
          path: spec.replicas

  - it: should not set replicas for process traces
    set:
      processTraces.enabled: true
    templates:
      - process-traces-deployment.yaml
    asserts:
      - notExists:
          path: spec.replicas
