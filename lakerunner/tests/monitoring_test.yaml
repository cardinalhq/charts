suite: test monitoring configuration
values:
  - ../values.yaml
set:
  cloudProvider.aws.region: us-west-2
  license.data: '{"key":"test"}'
templates:
  - monitoring-deployment.yaml
tests:
  # Conditional Rendering Tests
  - it: should render monitoring deployment when enabled
    set:
      monitoring.enabled: true
    templates:
      - monitoring-deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-lakerunner-monitoring

  - it: should not render monitoring resources when disabled
    set:
      monitoring.enabled: false
    templates:
      - monitoring-deployment.yaml
    asserts:
      - hasDocuments:
          count: 0

  # Resource Configuration Tests
  - it: should set default resources
    set:
      monitoring.enabled: true
    templates:
      - monitoring-deployment.yaml
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].resources.requests.cpu
      - isNotNull:
          path: spec.template.spec.containers[0].resources.requests.memory
      - isNotNull:
          path: spec.template.spec.containers[0].resources.limits.cpu
      - isNotNull:
          path: spec.template.spec.containers[0].resources.limits.memory

  - it: should allow custom resource configuration
    set:
      monitoring.enabled: true
      monitoring.resources:
        requests:
          cpu: "200m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
    templates:
      - monitoring-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: "200m"
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: "256Mi"
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: "500m"
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: "512Mi"

  # Port Configuration Tests
  - it: should expose only the healthcheck container port
    set:
      monitoring.enabled: true
    templates:
      - monitoring-deployment.yaml
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers[0].ports
          count: 1
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: healthcheck

  # Database Secret Configuration Tests
  - it: should configure database environment variables
    set:
      monitoring.enabled: true
      database.lrdb.host: "test-db-host"
      database.lrdb.port: "5432"
      database.lrdb.name: "test-db"
      database.lrdb.username: "test-user"
      database.lrdb.sslMode: "require"
    templates:
      - monitoring-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LRDB_HOST
            value: "test-db-host"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LRDB_PORT
            value: "5432"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LRDB_DBNAME
            value: "test-db"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LRDB_USER
            value: "test-user"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LRDB_SSLMODE
            value: "require"

  - it: should reference database password from secret
    set:
      monitoring.enabled: true
      database.create: true
      database.secretName: "postgresql-secret"
      database.passwordKey: "password"
    templates:
      - monitoring-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LRDB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-lakerunner-postgresql-secret
                key: password

  - it: should use existing secret name when database.create is false
    set:
      monitoring.enabled: true
      database.create: false
      database.secretName: "existing-db-secret"
      database.passwordKey: "db-password"
    templates:
      - monitoring-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LRDB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: existing-db-secret
                key: db-password

  # Security Context Tests
  - it: should apply security context
    set:
      monitoring.enabled: true
    templates:
      - monitoring-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 65532
      - equal:
          path: spec.template.spec.securityContext.runAsGroup
          value: 65532
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 65532
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop
          content: "ALL"
      - equal:
          path: spec.template.spec.containers[0].securityContext.seccompProfile.type
          value: "RuntimeDefault"

  # Image Configuration Tests
  - it: should use default image
    set:
      monitoring.enabled: true
    templates:
      - monitoring-deployment.yaml
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^ghcr\\.io/cardinalhq/lakerunner:"

  - it: should allow custom image configuration
    set:
      monitoring.enabled: true
      monitoring.image:
        repository: "custom.registry.io/monitoring"
        tag: "v2.0.0"
        pullPolicy: "Always"
    templates:
      - monitoring-deployment.yaml
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^custom\\.registry\\.io/monitoring:v2\\.0\\.0$"
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: "Always"

  # Command and Args Tests
  - it: should configure correct command and args
    set:
      monitoring.enabled: true
    templates:
      - monitoring-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].command[0]
          value: "/app/bin/lakerunner"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "monitoring"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "serve"

  # Replica Configuration Tests
  - it: should set default replica count
    set:
      monitoring.enabled: true
    templates:
      - monitoring-deployment.yaml
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: should allow custom replica count
    set:
      monitoring.enabled: true
      monitoring.replicas: 3
    templates:
      - monitoring-deployment.yaml
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  # Labels and Selectors Tests
  - it: should set correct labels and selectors
    set:
      monitoring.enabled: true
    templates:
      - monitoring-deployment.yaml
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          value: "monitoring"
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/component"]
          value: "monitoring"

  # Environment Variables Tests
  - it: should set OTEL_SERVICE_NAME
    set:
      monitoring.enabled: true
    templates:
      - monitoring-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OTEL_SERVICE_NAME
            value: RELEASE-NAME-lakerunner-monitoring

  - it: should set TMPDIR
    set:
      monitoring.enabled: true
    templates:
      - monitoring-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TMPDIR
            value: /scratch
