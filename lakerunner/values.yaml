      repository: ghcr.io/cardinalhq/lakerunner
      tag: ""
      pullPolicy: ""
    resources:
      requests:
        cpu: "1"
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 512Mi
    nodeSelector: {}
    tolerations: []
    affinity: {}
  SQS:
    enabled: false
    replicas: 2
    # REQUIRED when enabled: Your SQS queue URL
    # Example: "https://sqs.us-east-2.amazonaws.com/123456789012/my-queue"
    queueURL: ""
    # AWS region for the SQS queue - defaults to global aws.region if not specified
    # Example: "us-east-2"
    region: ""
    roleARN: ""
    image:
      repository: ghcr.io/cardinalhq/lakerunner
      tag: ""
      pullPolicy: ""
    resources:
      requests:
        cpu: "1"
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 512Mi
    nodeSelector: {}
    tolerations: []
    affinity: {}
  GCP:
    enabled: false
    replicas: 1
    # REQUIRED when enabled: Your GCP project ID
    # Example: "my-project-123456"
    projectID: ""
    # REQUIRED when enabled: Your GCP Pub/Sub subscription ID
    # Example: "my-subscription"
    subscriptionID: ""
    image:
      repository: ghcr.io/cardinalhq/lakerunner
      tag: ""
      pullPolicy: ""
    resources:
      requests:
        cpu: "1"
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 512Mi
    nodeSelector: {}
    tolerations: []
    affinity: {}
    env: []
  Azure:
    enabled: false
    replicas: 1
    # REQUIRED when enabled: Your Azure Storage Account name
    # Example: "mystorageaccount"
    storageAccount: ""
    # REQUIRED when enabled: Your Azure Storage Queue name
    # Example: "sqs"
    queueName: ""
    image:
      repository: ghcr.io/cardinalhq/lakerunner
      tag: ""
      pullPolicy: ""
    resources:
      requests:
        cpu: "1"
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 512Mi
    nodeSelector: {}
    tolerations: []
    affinity: {}
    env: []

