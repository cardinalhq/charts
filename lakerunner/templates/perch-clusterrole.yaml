{{- if .Values.perch.enabled -}}
# Perch needs to watch Deployments across multiple namespaces,
# so it uses a ClusterRole instead of the namespace-scoped Role.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "lakerunner.fullname" . }}-perch
  labels:
    {{- include "lakerunner.labels" . | nindent 4 }}
    app.kubernetes.io/component: perch
  {{ include "lakerunner.annotations" . | nindent 2 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "lakerunner.fullname" . }}-perch
  labels:
    {{- include "lakerunner.labels" . | nindent 4 }}
    app.kubernetes.io/component: perch
  {{ include "lakerunner.annotations" . | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "lakerunner.fullname" . }}-perch
subjects:
  - kind: ServiceAccount
    name: {{ include "lakerunner.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
