{{- if .Values.perch.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lakerunner.fullname" . }}-perch
  labels:
    {{- include "lakerunner.labels" . | nindent 4 }}
    app.kubernetes.io/component: perch
  {{ include "lakerunner.annotations" . | nindent 2 }}
data:
  config.yaml: |
    cluster_id: {{ .Values.perch.clusterId | default "" | quote }}
    maestro:
      url: {{ .Values.perch.maestro.url | quote }}
      report_interval: {{ .Values.perch.maestro.reportInterval | default "5m" }}
    registry:
      poll_interval: {{ .Values.perch.registry.pollInterval | default "10m" }}
    components:
    {{- range .Values.perch.components }}
      - name: {{ .name | quote }}
        namespaces:
        {{- range .namespaces }}
          - {{ . | quote }}
        {{- end }}
        {{- if .labelSelector }}
        label_selector: {{ .labelSelector | quote }}
        {{- end }}
    {{- end }}
    {{- if .Values.perch.collectors.enabled }}
    collectors:
      enabled: true
      ship_config_body: {{ .Values.perch.collectors.shipConfigBody }}
      watch_crs: {{ .Values.perch.collectors.watchCRs }}
      heartbeat_interval: {{ .Values.perch.collectors.heartbeatInterval | default "5m" }}
      reconcile_interval: {{ .Values.perch.collectors.reconcileInterval | default "15m" }}
      namespaces:
      {{- range .Values.perch.collectors.namespaces }}
        - {{ . | quote }}
      {{- end }}
      {{- with .Values.perch.collectors.imageAllowlist }}
      image_allowlist:
      {{- range . }}
        - {{ . | quote }}
      {{- end }}
      {{- end }}
    {{- end }}
    health:
      port: {{ .Values.global.healthProbes.healthcheckPort }}
{{- end }}
