{{- if .Values.alertEvaluator.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lakerunner.fullname" . }}-alert-evaluator
  labels:
    {{- include "lakerunner.labels" . | nindent 4 }}
    app.kubernetes.io/component: alert-evaluator
  {{ include "lakerunner.annotations" . | nindent 2}}
spec:
  replicas: {{ .Values.alertEvaluator.replicas }}
  selector:
    matchLabels:
      {{- include "lakerunner.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: alert-evaluator
  template:
    metadata:
      labels:
        {{- include "lakerunner.labels" . | nindent 8 }}
        app.kubernetes.io/component: alert-evaluator
        {{- if eq .Values.cloudProvider.azure.authType "workload_identity" }}
        azure.workload.identity/use: "true"
        {{- end }}
      {{- include "lakerunner.annotations" . | nindent 6 }}
    spec:
      serviceAccountName: {{ include "lakerunner.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      {{- include "lakerunner.imagePullSecrets" . | nindent 6 }}
      {{- include "lakerunner.sched.nodeSelector" (list .Values.global.nodeSelector .Values.alertEvaluator.nodeSelector) | nindent 6 }}
      {{- include "lakerunner.sched.tolerations"  (list .Values.global.tolerations  .Values.alertEvaluator.tolerations)  | nindent 6 }}
      {{- include "lakerunner.sched.affinity"     (list .Values.global.affinity     .Values.alertEvaluator.affinity)     | nindent 6 }}
      containers:
      - name: alert-evaluator
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        image: {{ include "lakerunner.image" (list .Values.alertEvaluator.image .) }}
        imagePullPolicy: {{ .Values.alertEvaluator.image.pullPolicy | default .Values.global.image.pullPolicy }}
        command: ["/app/bin/lakerunner"]
        args: ["alert-evaluator"]
        ports:
          - name: healthcheck
            containerPort: {{ .Values.global.healthProbes.healthcheckPort }}
            protocol: TCP
        env:
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: OTEL_SERVICE_NAME
            value: {{ include "lakerunner.fullname" . }}-alert-evaluator
          - name: TMPDIR
            value: /scratch
          - name: ALERT_EVALUATOR_QUERY_API_URL
            value: {{ .Values.alertEvaluator.queryApiUrl | default (printf "http://%s-query-api:%v" (include "lakerunner.fullname" .) .Values.queryApi.service.port) | quote }}
          - name: INTERNAL_SERVICE_KEYS
            valueFrom:
              secretKeyRef:
                name: {{ include "lakerunner.intkeySecretName" . }}
                key: internal-service-keys
          {{- if eq .Values.cloudProvider.provider "azure" }}
          - name: AZURE_AUTH_TYPE
            value: {{ .Values.cloudProvider.azure.authType | quote }}
          {{- end }}
          {{- include "lakerunner.injectEnv" (list . .Values.alertEvaluator) | nindent 8 }}
          {{- include "lakerunner.cardinalTelemetryEnv" . | nindent 10 }}
        {{- if eq (include "lakerunner.injectCloudProviderCredentials" .) "true" }}
        envFrom:
          - secretRef:
              name: {{ include "lakerunner.cloudProviderSecretName" . }}
        {{- end }}
        {{- include "lakerunner.healthProbes" (list . .Values.alertEvaluator) | nindent 8 }}
        {{- if .Values.global.resources.enabled }}
        resources:
          {{- toYaml .Values.alertEvaluator.resources | nindent 10 }}
        {{- end }}
        volumeMounts:
        - name: scratch
          mountPath: /scratch
        {{- include "lakerunner.licenseVolumeMount" . | nindent 8 }}
      volumes:
      {{- include "lakerunner.ephemeralVolumeBasic" (list "scratch" .) | nindent 6 }}
      {{- include "lakerunner.licenseVolume" . | nindent 6 }}
{{- end }}
