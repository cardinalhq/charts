{{- if .Values.perch.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lakerunner.fullname" . }}-perch
  labels:
    {{- include "lakerunner.labelsWithComponent" (list . .Values.perch.labels) | nindent 4 }}
    app.kubernetes.io/component: perch
  {{ include "lakerunner.annotationsWithComponent" (list . .Values.perch.annotations) | nindent 2 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "lakerunner.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: perch
  template:
    metadata:
      labels:
        {{- include "lakerunner.labelsWithComponent" (list . .Values.perch.labels) | nindent 8 }}
        app.kubernetes.io/component: perch
      {{- include "lakerunner.annotationsWithComponent" (list . .Values.perch.annotations) | nindent 6 }}
    spec:
      serviceAccountName: {{ include "lakerunner.serviceAccountName" . }}
      {{- include "lakerunner.podSecurityContext" (dict "root" . "override" .Values.perch.podSecurityContext) | nindent 6 }}
      {{- include "lakerunner.imagePullSecrets" . | nindent 6 }}
      {{- include "lakerunner.sched.nodeSelector" (list .Values.global.nodeSelector .Values.perch.nodeSelector) | nindent 6 }}
      {{- include "lakerunner.sched.tolerations"  (list .Values.global.tolerations  .Values.perch.tolerations)  | nindent 6 }}
      {{- include "lakerunner.sched.affinity"     (list .Values.global.affinity     .Values.perch.affinity)     | nindent 6 }}
      containers:
      - name: perch
        {{- include "lakerunner.containerSecurityContext" (dict "root" . "override" .Values.perch.containerSecurityContext) | nindent 8 }}
        image: {{ include "lakerunner.image" (list .Values.perch.image .) }}
        imagePullPolicy: {{ .Values.perch.image.pullPolicy | default .Values.global.image.pullPolicy }}
        command: ["/app/bin/lakerunner"]
        args:
          - "perch"
          - "--config=/etc/perch/config.yaml"
        ports:
          - name: healthcheck
            containerPort: {{ .Values.global.healthProbes.healthcheckPort }}
            protocol: TCP
        env:
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: OTEL_SERVICE_NAME
            value: {{ include "lakerunner.fullname" . }}-perch
          {{- include "lakerunner.injectEnv" (list . .Values.perch) | nindent 8 }}
          {{- include "lakerunner.cardinalTelemetryEnv" . | nindent 10 }}
        {{- include "lakerunner.healthProbes" (list . .Values.perch) | nindent 8 }}
        {{- if .Values.global.resources.enabled }}
        resources:
          {{- toYaml .Values.perch.resources | nindent 10 }}
        {{- end }}
        volumeMounts:
        - name: scratch
          mountPath: /scratch
        - name: perch-config
          mountPath: /etc/perch/config.yaml
          subPath: config.yaml
          readOnly: true
        {{- include "lakerunner.licenseVolumeMount" . | nindent 8 }}
      volumes:
      {{- include "lakerunner.ephemeralVolumeBasic" (list "scratch" .) | nindent 6 }}
      - name: perch-config
        configMap:
          name: {{ include "lakerunner.fullname" . }}-perch
      {{- include "lakerunner.licenseVolume" . | nindent 6 }}
{{- end }}
