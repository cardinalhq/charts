apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "lakerunner.fullname" . }}-scaler
  labels:
    {{- include "lakerunner.labels" . | nindent 4 }}
  {{ include "lakerunner.annotations" . | nindent 2 }}
rules:
  # query-api / query-worker discover peer workers via Services + EndpointSlices.
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  # Read the process-* HorizontalPodAutoscalers in this namespace.
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "lakerunner.fullname" . }}-scaler
  labels:
    {{- include "lakerunner.labels" . | nindent 4 }}
  {{ include "lakerunner.annotations" . | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name:  {{ include "lakerunner.fullname" . }}-scaler
subjects:
  - kind: ServiceAccount
    name:  {{ include "lakerunner.serviceAccountName" . }}
    namespace: {{ include "lakerunner.namespace" . }}
