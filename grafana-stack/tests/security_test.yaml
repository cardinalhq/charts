suite: test security context
values:
  - ../values.yaml
templates:
  - mcp-gateway-deployment.yaml
  - conductor-server-deployment.yaml
  - maestro-server-deployment.yaml
tests:
  - it: mcp-gateway should run as non-root
    templates:
      - mcp-gateway-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 65532

  - it: mcp-gateway container should drop all capabilities
    templates:
      - mcp-gateway-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop[0]
          value: ALL

  - it: conductor-server should run as non-root
    templates:
      - conductor-server-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 65532

  - it: maestro-server should run as non-root
    templates:
      - maestro-server-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 65532
