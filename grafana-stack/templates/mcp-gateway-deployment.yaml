{{- if .Values.mcpGateway.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "grafana-stack.fullname" . }}-mcp-gateway
  labels:
    {{- include "grafana-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-gateway
  {{- include "grafana-stack.annotations" . | nindent 2 }}
spec:
  replicas: {{ .Values.mcpGateway.replicas }}
  selector:
    matchLabels:
      {{- include "grafana-stack.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mcp-gateway
  template:
    metadata:
      labels:
        {{- include "grafana-stack.labels" . | nindent 8 }}
        app.kubernetes.io/component: mcp-gateway
      {{- include "grafana-stack.annotations" . | nindent 6 }}
    spec:
      serviceAccountName: {{ include "grafana-stack.mcpGateway.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      {{- include "grafana-stack.imagePullSecrets" . | nindent 6 }}
      containers:
      - name: mcp-gateway
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        image: {{ include "grafana-stack.mcpGateway.image" . }}
        imagePullPolicy: {{ .Values.mcpGateway.image.pullPolicy }}
        command: ["/app/entrypoint.sh"]
        args: ["mcp-gateway"]
        ports:
        - containerPort: {{ .Values.mcpGateway.port }}
          name: mcp
          protocol: TCP
        - containerPort: {{ .Values.mcpGateway.debugPort }}
          name: debug
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /healthz
            port: {{ .Values.mcpGateway.port }}
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: {{ .Values.mcpGateway.port }}
          initialDelaySeconds: 10
          periodSeconds: 30
        env:
          {{- if .Values.mcpGateway.lakerunnerApiUrl }}
          - name: LAKERUNNER_API_URL
            value: {{ .Values.mcpGateway.lakerunnerApiUrl | quote }}
          {{- end }}
          - name: HOST_IP
            valueFrom:
              fieldRef:
                fieldPath: status.hostIP
          - name: OTEL_SERVICE_NAME
            value: "mcp-gateway"
          - name: OTEL_EXPORTER_OTLP_ENDPOINT
            value: "http://$(HOST_IP):4318"
          {{- with .Values.global.env }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
          {{- with .Values.mcpGateway.env }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        envFrom:
          - secretRef:
              name: {{ include "grafana-stack.mcpGateway.secretName" . }}
        resources:
          {{- toYaml .Values.mcpGateway.resources | nindent 10 }}
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
      {{- with .Values.mcpGateway.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mcpGateway.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mcpGateway.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
