{{- if .Values.conductorServer.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "grafana-stack.fullname" . }}-conductor-server
  labels:
    {{- include "grafana-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: conductor-server
  {{- include "grafana-stack.annotations" . | nindent 2 }}
spec:
  replicas: {{ .Values.conductorServer.replicas }}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      {{- include "grafana-stack.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: conductor-server
  template:
    metadata:
      labels:
        {{- include "grafana-stack.labels" . | nindent 8 }}
        app.kubernetes.io/component: conductor-server
      {{- include "grafana-stack.annotations" . | nindent 6 }}
    spec:
      serviceAccountName: {{ include "grafana-stack.conductorServer.serviceAccountName" . }}
      securityContext:
        runAsUser: 65532
        runAsGroup: 65532
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      {{- include "grafana-stack.imagePullSecrets" . | nindent 6 }}
      containers:
      - name: conductor-server
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        image: {{ include "grafana-stack.conductorServer.image" . }}
        imagePullPolicy: {{ .Values.conductorServer.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.conductorServer.port }}
          name: http
        readinessProbe:
          httpGet:
            path: /api/health
            port: {{ .Values.conductorServer.port }}
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health
            port: {{ .Values.conductorServer.port }}
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        env:
          - name: OPENAI_API_KEY
            valueFrom:
              secretKeyRef:
                name: {{ include "grafana-stack.conductorServer.llmSecretName" . }}
                key: OPENAI_API_KEY
          - name: LAKERUNNER_API_KEY
            valueFrom:
              secretKeyRef:
                name: {{ include "grafana-stack.conductorServer.secretName" . }}
                key: LAKERUNNER_API_KEY
          - name: CARDINALHQ_API_KEY
            valueFrom:
              secretKeyRef:
                name: {{ include "grafana-stack.conductorServer.secretName" . }}
                key: CARDINALHQ_API_KEY
          - name: MCP_API_KEY
            valueFrom:
              secretKeyRef:
                name: {{ include "grafana-stack.conductorServer.secretName" . }}
                key: MCP_API_KEY
          - name: MCP_GATEWAY_URL
            value: "http://{{ include "grafana-stack.fullname" . }}-mcp-gateway:{{ .Values.mcpGateway.port }}"
          - name: WORKFLOW_LLM_PROVIDER
            value: {{ .Values.conductorServer.llm.provider | quote }}
          - name: WORKFLOW_BEDROCK_INFERENCE_MODEL
            value: {{ .Values.conductorServer.llm.bedrockModel | quote }}
          - name: AWS_REGION
            value: {{ .Values.conductorServer.llm.awsRegion | quote }}
          - name: HOST_IP
            valueFrom:
              fieldRef:
                fieldPath: status.hostIP
          - name: OTEL_SERVICE_NAME
            value: "conductor-server"
          - name: OTEL_EXPORTER_OTLP_ENDPOINT
            value: "http://$(HOST_IP):4318"
          {{- with .Values.global.env }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
          {{- with .Values.conductorServer.env }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        resources:
          {{- toYaml .Values.conductorServer.resources | nindent 10 }}
      {{- with .Values.conductorServer.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.conductorServer.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.conductorServer.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
