apiVersion: apps/v1
kind: Deployment
metadata:
  name: collector-poller
  labels:
    app.kubernetes.io/component: collector
    app.kubernetes.io/instance: collector-poller
    app.kubernetes.io/name: cardinalhq-otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: collector
      app.kubernetes.io/instance: collector-poller
      app.kubernetes.io/name: cardinalhq-otel-collector
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/component: collector
        app.kubernetes.io/instance: collector-poller
        app.kubernetes.io/name: cardinalhq-otel-collector
    spec:
      serviceAccountName: collector-poller
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 2000
        runAsGroup: 2000
        fsGroup: 2000
      containers:
        - name: collector
          image: public.ecr.aws/cardinalhq.io/cardinalhq-otel-collector:v1.5.0-rc1
          imagePullPolicy: IfNotPresent
          command:
            - /app/bin/cardinalhq-otel-collector
            - --config=/app/config/collector.yaml
          env:
            - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
              value: Delta
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: K8S_CLUSTER_NAME
              value: "REPLACE_ME"
          ports:
            - {containerPort: 13133, name: healthz, protocol: TCP}
          readinessProbe:
            httpGet:
              path: /healthz
              port: 13133
            initialDelaySeconds: 3
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: "1"
              memory: 500Mi
            limits:
              cpu: "1"
              memory: 500Mi
          volumeMounts:
            - name: config
              mountPath: /app/config
      volumes:
        - name: config
          configMap:
            name: collector-poller-config
