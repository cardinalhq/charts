apiVersion: apps/v1
kind: Deployment
metadata:
  name: collector-gateway
  labels:
    app.kubernetes.io/component: collector
    app.kubernetes.io/instance: collector-gateway
    app.kubernetes.io/name: cardinalhq-otel-collector
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/component: collector
      app.kubernetes.io/instance: collector-gateway
      app.kubernetes.io/name: cardinalhq-otel-collector
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/component: collector
        app.kubernetes.io/instance: collector-gateway
        app.kubernetes.io/name: cardinalhq-otel-collector
    spec:
      serviceAccountName: collector-gateway
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/component: collector
                    app.kubernetes.io/instance: collector-gateway
                    app.kubernetes.io/name: cardinalhq-otel-collector
                topologyKey: kubernetes.io/hostname
      containers:
        - name: collector
          image: public.ecr.aws/cardinalhq.io/cardinalhq-otel-collector:v1.5.0
          imagePullPolicy: IfNotPresent
          command:
            - /app/bin/cardinalhq-otel-collector
            - --config=/app/config/collector.yaml
          env:
            - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
              value: Delta
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_REGION
              value: "REPLACE_ME"
            - name: AWS_S3_ENDPOINT
              value: "REPLACE_ME"
            - name: AWS_S3_BUCKET
              value: "REPLACE_ME"
            - name: AWS_ROLE_ARN
              value: ""
            - name: HEADLESS_SERVICE_NAME
              value: collector-gateway-headless
            - name: K8S_CLUSTER_NAME
              value: "REPLACE_ME"
            - name: LAKERUNNER_ORGANIZATION_ID
              value: "REPLACE_ME"
          ports:
            - {containerPort: 4317, name: otlp-grpc, protocol: TCP}
            - {containerPort: 4318, name: otlp-http, protocol: TCP}
            - {containerPort: 13133, name: healthz, protocol: TCP}
            - {containerPort: 14317, name: loadbalancer, protocol: TCP}
            - {containerPort: 24318, name: interproc, protocol: TCP}
          readinessProbe:
            httpGet:
              path: /healthz
              port: 13133
            initialDelaySeconds: 3
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: "2"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: config
              mountPath: /app/config
      volumes:
        - name: config
          configMap:
            name: collector-gateway-config
