apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: collector-agent-k8sattributes
  labels:
    app.kubernetes.io/component: collector
    app.kubernetes.io/instance: collector-agent
    app.kubernetes.io/name: cardinalhq-otel-collector
rules:
  - apiGroups: [""]
    resources: [pods, namespaces]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [deployments, replicasets, statefulsets, daemonsets, cronjobs, jobs]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: collector-agent-kubeletstats
  labels:
    app.kubernetes.io/component: collector
    app.kubernetes.io/instance: collector-agent
    app.kubernetes.io/name: cardinalhq-otel-collector
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/metrics, nodes/proxy, nodes/stats, nodes/spec]
    verbs: [get, list, watch]
