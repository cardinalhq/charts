apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: collector-agent
  labels:
    app.kubernetes.io/component: collector
    app.kubernetes.io/instance: collector-agent
    app.kubernetes.io/name: cardinalhq-otel-collector
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: collector
      app.kubernetes.io/instance: collector-agent
      app.kubernetes.io/name: cardinalhq-otel-collector
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/component: collector
        app.kubernetes.io/instance: collector-agent
        app.kubernetes.io/name: cardinalhq-otel-collector
    spec:
      serviceAccountName: collector-agent
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists
      terminationGracePeriodSeconds: 30
      containers:
        - name: collector
          image: public.ecr.aws/cardinalhq.io/cardinalhq-otel-collector:v1.5.0
          imagePullPolicy: IfNotPresent
          command:
            - /app/bin/cardinalhq-otel-collector
            - --config=/app/config/collector.yaml
          env:
            - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
              value: Delta
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: K8S_CLUSTER_NAME
              value: "REPLACE_ME"
          ports:
            - {containerPort: 4317, hostPort: 4317, name: otlp-grpc, protocol: TCP}
            - {containerPort: 4318, hostPort: 4318, name: otlp-http, protocol: TCP}
            - {containerPort: 13133, name: healthz, protocol: TCP}
          readinessProbe:
            httpGet:
              path: /healthz
              port: 13133
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: "1"
              memory: 500Mi
            limits:
              cpu: "1"
              memory: 500Mi
          volumeMounts:
            - name: config
              mountPath: /app/config
      volumes:
        - name: config
          configMap:
            name: collector-agent-config
