{{- if .Values.mcpGateway.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "maestro.fullname" . }}-mcp-gateway
  labels:
    {{- include "maestro.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-gateway
  {{ include "maestro.annotations" . | nindent 2 }}
spec:
  replicas: {{ .Values.mcpGateway.replicas }}
  selector:
    matchLabels:
      {{- include "maestro.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mcp-gateway
  template:
    metadata:
      labels:
        {{- include "maestro.labels" . | nindent 8 }}
        app.kubernetes.io/component: mcp-gateway
      {{- include "maestro.annotations" . | nindent 6 }}
    spec:
      serviceAccountName: {{ include "maestro.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      {{- include "maestro.imagePullSecrets" . | nindent 6 }}
      containers:
      - name: mcp-gateway
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        image: {{ include "maestro.image" . }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["/app/entrypoint.sh"]
        args: ["mcp-gateway"]
        ports:
        - containerPort: {{ .Values.mcpGateway.port }}
          name: http
        - containerPort: {{ .Values.mcpGateway.debugPort }}
          name: debug
        env:
          {{ include "maestro.databaseEnv" . | nindent 10 }}
          - name: MCP_PORT
            value: {{ .Values.mcpGateway.port | quote }}
          - name: MCP_DEBUG_PORT
            value: {{ .Values.mcpGateway.debugPort | quote }}
          {{- if .Values.mcpGateway.apiKey }}
          - name: MCP_API_KEY
            value: {{ .Values.mcpGateway.apiKey | quote }}
          {{- end }}
          {{- with .Values.global.env }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
          {{- with .Values.mcpGateway.env }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        {{- if .Values.global.resources.enabled }}
        resources:
          {{- toYaml .Values.mcpGateway.resources | nindent 10 }}
        {{- end }}
      {{- include "maestro.sched.nodeSelector" (list .Values.global.nodeSelector .Values.mcpGateway.nodeSelector) | nindent 6 }}
      {{- include "maestro.sched.tolerations"  (list .Values.global.tolerations  .Values.mcpGateway.tolerations)  | nindent 6 }}
      {{- include "maestro.sched.affinity"     (list .Values.global.affinity     .Values.mcpGateway.affinity)     | nindent 6 }}
{{- end }}
