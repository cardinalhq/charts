{{- if .Values.uiWeb.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "maestro.fullname" . }}-ui-web
  labels:
    {{- include "maestro.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui-web
  {{ include "maestro.annotations" . | nindent 2 }}
spec:
  replicas: {{ .Values.uiWeb.replicas }}
  selector:
    matchLabels:
      {{- include "maestro.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ui-web
  template:
    metadata:
      labels:
        {{- include "maestro.labels" . | nindent 8 }}
        app.kubernetes.io/component: ui-web
      {{- include "maestro.annotations" . | nindent 6 }}
    spec:
      serviceAccountName: {{ include "maestro.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      {{- include "maestro.imagePullSecrets" . | nindent 6 }}
      containers:
      - name: ui-web
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        image: {{ include "maestro.image" (list .Values.uiWeb.image .) }}
        imagePullPolicy: {{ .Values.uiWeb.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.uiWeb.port }}
          name: http
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
        resources:
          {{- toYaml .Values.uiWeb.resources | nindent 10 }}
        volumeMounts:
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: nginx.conf
          readOnly: true
        - name: tmp
          mountPath: /tmp
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-run
          mountPath: /var/run
      {{- include "maestro.sched.nodeSelector" (list .Values.global.nodeSelector .Values.uiWeb.nodeSelector) | nindent 6 }}
      {{- include "maestro.sched.tolerations"  (list .Values.global.tolerations  .Values.uiWeb.tolerations)  | nindent 6 }}
      {{- include "maestro.sched.affinity"     (list .Values.global.affinity     .Values.uiWeb.affinity)     | nindent 6 }}
      volumes:
      - name: nginx-conf
        configMap:
          name: {{ include "maestro.fullname" . }}-ui-web-nginx
      - name: tmp
        emptyDir: {}
      - name: nginx-cache
        emptyDir: {}
      - name: nginx-run
        emptyDir: {}
{{- end }}
