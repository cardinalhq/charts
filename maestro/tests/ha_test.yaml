suite: HA / POC mode toggle and objectStore wiring
templates:
  - maestro-deployment.yaml
  - mcp-gateway-deployment.yaml
  - github-cache-statefulset.yaml
  - github-cache-provisioner-deployment.yaml
tests:
  # ---- POC defaults (ha.enabled=false) ----------------------------------
  - it: "POC default: maestro replicas auto-derive to 1"
    template: maestro-deployment.yaml
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: "POC default: mcp-gateway replicas auto-derive to 1"
    template: mcp-gateway-deployment.yaml
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: "POC default: github-cache StatefulSet is absent"
    template: github-cache-statefulset.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: "POC default: github-cache provisioner is absent"
    template: github-cache-provisioner-deployment.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: "POC default: no GITHUB_CACHE_REMOTE on maestro"
    template: maestro-deployment.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: GITHUB_CACHE_REMOTE
            value: "1"

  - it: "POC default: no MAESTRO_ARTIFACT_STORE on maestro"
    template: maestro-deployment.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: MAESTRO_ARTIFACT_STORE
            value: "object"

  # ---- HA mode (ha.enabled=true) ----------------------------------------
  - it: "HA: maestro replicas auto-derive to 2"
    template: maestro-deployment.yaml
    set:
      ha.enabled: true
      objectStore.bucket: my-bucket
    asserts:
      - equal:
          path: spec.replicas
          value: 2

  - it: "HA: mcp-gateway replicas auto-derive to 2"
    template: mcp-gateway-deployment.yaml
    set:
      ha.enabled: true
      objectStore.bucket: my-bucket
    asserts:
      - equal:
          path: spec.replicas
          value: 2

  - it: "HA: explicit higher replicas honored"
    template: maestro-deployment.yaml
    set:
      ha.enabled: true
      objectStore.bucket: my-bucket
      maestro.replicas: 4
    asserts:
      - equal:
          path: spec.replicas
          value: 4

  - it: "HA: github-cache StatefulSet is rendered"
    template: github-cache-statefulset.yaml
    set:
      ha.enabled: true
      objectStore.bucket: my-bucket
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: spec.replicas
          value: 2

  - it: "HA: github-cache provisioner is rendered"
    template: github-cache-provisioner-deployment.yaml
    set:
      ha.enabled: true
      objectStore.bucket: my-bucket
    asserts:
      - isKind:
          of: Deployment

  - it: "HA: GITHUB_CACHE_REMOTE set on maestro"
    template: maestro-deployment.yaml
    set:
      ha.enabled: true
      objectStore.bucket: my-bucket
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GITHUB_CACHE_REMOTE
            value: "1"

  # ---- objectStore env wiring -------------------------------------------
  - it: "HA: MAESTRO_ARTIFACT_STORE=object and bucket emitted"
    template: maestro-deployment.yaml
    set:
      ha.enabled: true
      objectStore.bucket: my-bucket
      objectStore.region: us-east-2
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MAESTRO_ARTIFACT_STORE
            value: "object"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MAESTRO_ARTIFACT_S3_BUCKET
            value: "my-bucket"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MAESTRO_ARTIFACT_S3_REGION
            value: "us-east-2"

  - it: "HA: endpoint + forcePathStyle emitted for S3-compat"
    template: maestro-deployment.yaml
    set:
      ha.enabled: true
      objectStore.bucket: ceph-bucket
      objectStore.endpoint: http://rgw.rook-ceph.svc:80
      objectStore.forcePathStyle: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MAESTRO_ARTIFACT_S3_ENDPOINT
            value: "http://rgw.rook-ceph.svc:80"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MAESTRO_ARTIFACT_S3_FORCE_PATH_STYLE
            value: "1"

  - it: "HA: no AWS_ creds injected when existingSecret is empty (ambient creds)"
    template: maestro-deployment.yaml
    set:
      ha.enabled: true
      objectStore.bucket: my-bucket
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: AWS_ACCESS_KEY_ID
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: AWS_SECRET_ACCESS_KEY

  - it: "HA: AWS_ creds injected from existingSecret with default key names"
    template: maestro-deployment.yaml
    set:
      ha.enabled: true
      objectStore.bucket: my-bucket
      objectStore.auth.existingSecret: my-s3-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: "my-s3-secret"
                key: "AWS_ACCESS_KEY_ID"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: "my-s3-secret"
                key: "AWS_SECRET_ACCESS_KEY"

  - it: "HA: AWS_SESSION_TOKEN injected when sessionTokenKey set"
    template: maestro-deployment.yaml
    set:
      ha.enabled: true
      objectStore.bucket: my-bucket
      objectStore.auth.existingSecret: my-s3-secret
      objectStore.auth.sessionTokenKey: AWS_SESSION_TOKEN
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AWS_SESSION_TOKEN
            valueFrom:
              secretKeyRef:
                name: "my-s3-secret"
                key: "AWS_SESSION_TOKEN"

  - it: "HA: custom key names honored (e.g. Rook OBC variants)"
    template: maestro-deployment.yaml
    set:
      ha.enabled: true
      objectStore.bucket: my-bucket
      objectStore.auth.existingSecret: my-obc
      objectStore.auth.accessKeyIdKey: custom-access-key
      objectStore.auth.secretAccessKeyKey: custom-secret-key
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: "my-obc"
                key: "custom-access-key"

  # ---- HA invariants fail loud ------------------------------------------
  # NB: the validation helper is included from both maestro-deployment and
  # mcp-gateway-deployment. helm-unittest's `failedTemplate` matcher only
  # fires when the error is reported FROM the file named by `template:`,
  # which (because of helm's template-processing order) is the
  # mcp-gateway template. Asserting from there keeps the matcher reliable.
  - it: "HA without objectStore.bucket fails template rendering"
    template: mcp-gateway-deployment.yaml
    set:
      ha.enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "ha.enabled=true requires objectStore.bucket to be set (artifacts must be durable across pods). See values.yaml for AWS-S3 and Rook-Ceph examples."

  - it: "HA with explicit githubCache.enabled=false fails template rendering"
    template: mcp-gateway-deployment.yaml
    set:
      ha.enabled: true
      objectStore.bucket: my-bucket
      githubCache.enabled: false
    asserts:
      - failedTemplate:
          errorMessage: "ha.enabled=true is incompatible with explicit githubCache.enabled=false (in-process github-cache holds per-pod state and a single PVC, neither of which scales). Remove the override or set ha.enabled=false."

  - it: "HA with maestro.persistence.enabled=true fails template rendering"
    template: mcp-gateway-deployment.yaml
    set:
      ha.enabled: true
      objectStore.bucket: my-bucket
      maestro.persistence.enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "ha.enabled=true is incompatible with maestro.persistence.enabled=true (Recreate strategy + RWO PVC deadlocks rolling updates under replicas>1). Use objectStore for artifacts; the github-cache StatefulSet already handles its own per-pod PVCs."

  - it: "HA with maestro.replicas=1 fails template rendering"
    template: mcp-gateway-deployment.yaml
    set:
      ha.enabled: true
      objectStore.bucket: my-bucket
      maestro.replicas: 1
    asserts:
      - failedTemplate:
          errorMessage: "ha.enabled=true requires maestro.replicas >= 2 (got 1). Lower replica counts are POC mode; set ha.enabled=false."

  - it: "HA with mcpGateway.replicas=1 fails template rendering"
    template: mcp-gateway-deployment.yaml
    set:
      ha.enabled: true
      objectStore.bucket: my-bucket
      mcpGateway.replicas: 1
    asserts:
      - failedTemplate:
          errorMessage: "ha.enabled=true requires mcpGateway.replicas >= 2 (got 1). Lower replica counts are POC mode; set ha.enabled=false."

  - it: "HA with existingSecret but blank accessKeyIdKey fails template rendering"
    template: mcp-gateway-deployment.yaml
    set:
      ha.enabled: true
      objectStore.bucket: my-bucket
      objectStore.auth.existingSecret: my-secret
      objectStore.auth.accessKeyIdKey: ""
    asserts:
      - failedTemplate:
          errorMessage: "objectStore.auth.existingSecret is set but objectStore.auth.accessKeyIdKey is empty. Set the key name the secret uses (commonly AWS_ACCESS_KEY_ID)."

  # ---- explicit operator overrides under POC ----------------------------
  - it: "POC with explicit githubCache.enabled=true honored"
    template: github-cache-statefulset.yaml
    set:
      githubCache.enabled: true
    asserts:
      - isKind:
          of: StatefulSet

  - it: "POC with explicit maestro.replicas=3 honored (degenerate but allowed)"
    template: maestro-deployment.yaml
    set:
      maestro.replicas: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  # ---- robustness against operator-input quirks -------------------------
  - it: "empty-string maestro.replicas treated as unset (auto-derives)"
    template: maestro-deployment.yaml
    set:
      maestro.replicas: ""
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: "HA with empty-string maestro.replicas auto-derives to 2 (not blank)"
    template: maestro-deployment.yaml
    set:
      ha.enabled: true
      objectStore.bucket: my-bucket
      maestro.replicas: ""
    asserts:
      - equal:
          path: spec.replicas
          value: 2

  - it: "stringly ha.enabled (--set-string) fails loud (don't silently ignore a typo)"
    template: mcp-gateway-deployment.yaml
    set:
      ha.enabled: "true"
    asserts:
      - failedTemplate:
          errorMessage: "ha.enabled must be a YAML boolean (true or false), got true of type string. Use `--set ha.enabled=true` / `=false`, not `--set-string`."

  - it: "stringly githubCache.enabled (--set-string) fails loud"
    template: mcp-gateway-deployment.yaml
    set:
      githubCache.enabled: "false"
    asserts:
      - failedTemplate:
          errorMessage: "githubCache.enabled must be a YAML boolean (true or false), got false of type string. Use `--set githubCache.enabled=true` / `=false`, not `--set-string`."

  - it: "stringly maestro.persistence.enabled (--set-string) fails loud"
    template: mcp-gateway-deployment.yaml
    set:
      maestro.persistence.enabled: "true"
    asserts:
      - failedTemplate:
          errorMessage: "maestro.persistence.enabled must be a YAML boolean (true or false), got true of type string. Use `--set maestro.persistence.enabled=true` / `=false`, not `--set-string`."

  # ---- region default for S3-compat endpoint ----------------------------
  - it: "HA with endpoint defaults region to us-east-1 (AWS SDK requires one)"
    template: maestro-deployment.yaml
    set:
      ha.enabled: true
      objectStore.bucket: ceph-bucket
      objectStore.endpoint: http://rgw.rook-ceph.svc:80
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MAESTRO_ARTIFACT_S3_REGION
            value: "us-east-1"

  - it: "HA with explicit region honored even alongside endpoint"
    template: maestro-deployment.yaml
    set:
      ha.enabled: true
      objectStore.bucket: ceph-bucket
      objectStore.endpoint: http://rgw.rook-ceph.svc:80
      objectStore.region: eu-west-1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MAESTRO_ARTIFACT_S3_REGION
            value: "eu-west-1"

  # ---- objectStore.auth is bucket-gated --------------------------------
  - it: "POC with existingSecret but no bucket does NOT inject AWS_ creds"
    template: maestro-deployment.yaml
    set:
      objectStore.auth.existingSecret: my-secret
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: AWS_ACCESS_KEY_ID
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: AWS_SECRET_ACCESS_KEY

  # ---- HA also validates github-cache serving replicas ----------------
  - it: "HA with githubCache.serving.replicas=1 fails template rendering"
    template: mcp-gateway-deployment.yaml
    set:
      ha.enabled: true
      objectStore.bucket: my-bucket
      githubCache.serving.replicas: 1
    asserts:
      - failedTemplate:
          errorMessage: "ha.enabled=true requires githubCache.serving.replicas >= 2 (got 1). The serving StatefulSet must be redundant in HA mode."

  # ---- auth-key validation fires even outside HA (would break at runtime) ----
  - it: "POC: existingSecret with blank accessKeyIdKey still fails (would break at runtime)"
    template: mcp-gateway-deployment.yaml
    set:
      objectStore.bucket: my-bucket
      objectStore.auth.existingSecret: s
      objectStore.auth.accessKeyIdKey: ""
    asserts:
      - failedTemplate:
          errorMessage: "objectStore.auth.existingSecret is set but objectStore.auth.accessKeyIdKey is empty. Set the key name the secret uses (commonly AWS_ACCESS_KEY_ID)."
