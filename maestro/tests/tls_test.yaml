suite: in-pod TLS sidecar
templates:
  - maestro-deployment.yaml
  - maestro-service.yaml
  - maestro-tls-config.yaml
  - maestro-tls-secret.yaml
tests:
  - it: emits no TLS resources when disabled
    set:
      maestro.baseUrl: https://m.example.com
    asserts:
      - template: maestro-tls-config.yaml
        hasDocuments: { count: 0 }
      - template: maestro-tls-secret.yaml
        hasDocuments: { count: 0 }
      - template: maestro-deployment.yaml
        notContains:
          path: spec.template.spec.containers
          content:
            name: tls-proxy
          any: true
      - template: maestro-deployment.yaml
        notContains:
          path: spec.template.spec.initContainers
          content:
            name: tls-init
          any: true
      - template: maestro-service.yaml
        notContains:
          path: spec.ports
          content:
            name: https
          any: true

  - it: with autoGenerate, adds tls-init + tls-proxy + service https port
    set:
      maestro.baseUrl: https://m.example.com
      maestro.tls.enabled: true
    asserts:
      - template: maestro-deployment.yaml
        contains:
          path: spec.template.spec.initContainers
          content:
            name: tls-init
          any: true
      - template: maestro-deployment.yaml
        contains:
          path: spec.template.spec.containers
          content:
            name: tls-proxy
          any: true
      - template: maestro-service.yaml
        contains:
          path: spec.ports
          content:
            port: 4443
            targetPort: https
            name: https

  - it: nginx config redirects all temp paths under /tmp/nginx
    set:
      maestro.baseUrl: https://m.example.com
      maestro.tls.enabled: true
    asserts:
      - template: maestro-tls-config.yaml
        matchRegex:
          path: data["default.conf"]
          pattern: "client_body_temp_path /tmp/nginx/client_body;"
      - template: maestro-tls-config.yaml
        matchRegex:
          path: data["default.conf"]
          pattern: "proxy_temp_path       /tmp/nginx/proxy;"
      - template: maestro-tls-config.yaml
        matchRegex:
          path: data["default.conf"]
          pattern: "fastcgi_temp_path     /tmp/nginx/fastcgi;"
      - template: maestro-tls-config.yaml
        matchRegex:
          path: data["default.conf"]
          pattern: "uwsgi_temp_path       /tmp/nginx/uwsgi;"
      - template: maestro-tls-config.yaml
        matchRegex:
          path: data["default.conf"]
          pattern: "scgi_temp_path        /tmp/nginx/scgi;"

  - it: tls-proxy uses overridable image
    set:
      maestro.baseUrl: https://m.example.com
      maestro.tls.enabled: true
      maestro.tls.image.repository: registry.example.com/nginx
      maestro.tls.image.tag: 1.27-custom
    asserts:
      - template: maestro-deployment.yaml
        contains:
          path: spec.template.spec.containers
          content:
            name: tls-proxy
            image: registry.example.com/nginx:1.27-custom
          any: true

  - it: tls-init uses overridable openssl image and skips when secretName set
    set:
      maestro.baseUrl: https://m.example.com
      maestro.tls.enabled: true
      maestro.tls.cert.autoGenerate: false
      maestro.tls.secretName: my-tls
    asserts:
      - template: maestro-deployment.yaml
        notContains:
          path: spec.template.spec.initContainers
          content:
            name: tls-init
          any: true
      - template: maestro-deployment.yaml
        contains:
          path: spec.template.spec.volumes
          content:
            name: tls
            secret:
              secretName: my-tls

  - it: rejects http baseUrl when tls.enabled
    set:
      maestro.baseUrl: http://m.example.com
      maestro.tls.enabled: true
    template: maestro-tls-config.yaml
    asserts:
      - failedTemplate:
          errorMessage: "maestro.tls.enabled=true requires maestro.baseUrl to use https:// (got \"http://m.example.com\"). Either set maestro.baseUrl to an https URL or set ingress.tls so the chart derives one."

  - it: rejects both autoGenerate and secretName
    set:
      maestro.baseUrl: https://m.example.com
      maestro.tls.enabled: true
      maestro.tls.cert.autoGenerate: true
      maestro.tls.secretName: my-tls
    template: maestro-tls-config.yaml
    asserts:
      - failedTemplate:
          errorMessage: "maestro.tls: set exactly one cert source — cert.autoGenerate=true, secretName, or cert.crt+cert.key (set cert.autoGenerate=false when using one of the BYO paths)"

  - it: rejects no cert source
    set:
      maestro.baseUrl: https://m.example.com
      maestro.tls.enabled: true
      maestro.tls.cert.autoGenerate: false
    template: maestro-tls-config.yaml
    asserts:
      - failedTemplate:
          errorMessage: "maestro.tls.enabled=true requires one cert source: cert.autoGenerate=true (default), a non-empty secretName, or cert.crt+cert.key"

  - it: rejects autoGenerate combined with inline cert
    set:
      maestro.baseUrl: https://m.example.com
      maestro.tls.enabled: true
      maestro.tls.cert.autoGenerate: true
      maestro.tls.cert.crt: "PEM CERT"
      maestro.tls.cert.key: "PEM KEY"
    template: maestro-tls-config.yaml
    asserts:
      - failedTemplate:
          errorMessage: "maestro.tls: set exactly one cert source — cert.autoGenerate=true, secretName, or cert.crt+cert.key (set cert.autoGenerate=false when using one of the BYO paths)"

  - it: rejects secretName combined with inline cert
    set:
      maestro.baseUrl: https://m.example.com
      maestro.tls.enabled: true
      maestro.tls.cert.autoGenerate: false
      maestro.tls.secretName: my-tls
      maestro.tls.cert.crt: "PEM CERT"
      maestro.tls.cert.key: "PEM KEY"
    template: maestro-tls-config.yaml
    asserts:
      - failedTemplate:
          errorMessage: "maestro.tls: set exactly one cert source — cert.autoGenerate=true, secretName, or cert.crt+cert.key (set cert.autoGenerate=false when using one of the BYO paths)"

  - it: rejects inline cert with only crt
    set:
      maestro.baseUrl: https://m.example.com
      maestro.tls.enabled: true
      maestro.tls.cert.autoGenerate: false
      maestro.tls.cert.crt: "PEM CERT"
    template: maestro-tls-config.yaml
    asserts:
      - failedTemplate:
          errorMessage: "maestro.tls.cert: set both cert.crt and cert.key, or neither"

  - it: rejects inline cert with only key
    set:
      maestro.baseUrl: https://m.example.com
      maestro.tls.enabled: true
      maestro.tls.cert.autoGenerate: false
      maestro.tls.cert.key: "PEM KEY"
    template: maestro-tls-config.yaml
    asserts:
      - failedTemplate:
          errorMessage: "maestro.tls.cert: set both cert.crt and cert.key, or neither"

  - it: with inline cert, renders Secret and mounts it without tls-init
    set:
      maestro.baseUrl: https://1-2-3-4.nip.io:8443
      maestro.tls.enabled: true
      maestro.tls.cert.autoGenerate: false
      maestro.tls.cert.crt: "PEM CERT"
      maestro.tls.cert.key: "PEM KEY"
    release:
      name: r
    asserts:
      - template: maestro-tls-secret.yaml
        hasDocuments: { count: 1 }
      - template: maestro-tls-secret.yaml
        equal:
          path: kind
          value: Secret
      - template: maestro-tls-secret.yaml
        equal:
          path: type
          value: kubernetes.io/tls
      - template: maestro-tls-secret.yaml
        equal:
          path: metadata.name
          value: r-maestro-maestro-tls-cert
      - template: maestro-tls-secret.yaml
        equal:
          path: data["tls.crt"]
          value: UEVNIENFUlQ=     # base64("PEM CERT")
      - template: maestro-tls-secret.yaml
        equal:
          path: data["tls.key"]
          value: UEVNIEtFWQ==     # base64("PEM KEY")
      - template: maestro-deployment.yaml
        notContains:
          path: spec.template.spec.initContainers
          content:
            name: tls-init
          any: true
      - template: maestro-deployment.yaml
        contains:
          path: spec.template.spec.volumes
          content:
            name: tls
            secret:
              secretName: r-maestro-maestro-tls-cert

  - it: cert-init uses overridable openssl image
    set:
      maestro.baseUrl: https://m.example.com
      maestro.tls.enabled: true
      maestro.tls.cert.image.repository: registry.example.com/openssl
      maestro.tls.cert.image.tag: "3.3"
    asserts:
      - template: maestro-deployment.yaml
        contains:
          path: spec.template.spec.initContainers
          content:
            name: tls-init
            image: registry.example.com/openssl:3.3
          any: true

  - it: cert-init injects host derived from baseUrl into env
    set:
      maestro.baseUrl: https://m.example.com:8443
      maestro.tls.enabled: true
      maestro.tls.cert.sans:
        - bastion.example.com
        - 1-2-3-4.nip.io
    asserts:
      # tls-init is initContainers[1] (wait-for-mcp-gateway is [0]).
      - template: maestro-deployment.yaml
        equal:
          path: spec.template.spec.initContainers[1].name
          value: tls-init
      - template: maestro-deployment.yaml
        contains:
          path: spec.template.spec.initContainers[1].env
          content:
            name: TLS_HOST
            value: m.example.com
      - template: maestro-deployment.yaml
        contains:
          path: spec.template.spec.initContainers[1].env
          content:
            name: TLS_EXTRA_SANS
            value: bastion.example.com,1-2-3-4.nip.io
