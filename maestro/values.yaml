# Default values for maestro
# This is a YAML-formatted file.

nameOverride: ""
fullnameOverride: ""

# Unified image for all components (Maestro + MCP Gateway + UI SPA).
# Entrypoint selects which component to run.
image:
  repository: public.ecr.aws/cardinalhq.io/maestro
  tag: ""          # defaults to Chart.appVersion
  pullPolicy: IfNotPresent

# Maestro API server + UI configuration
maestro:
  enabled: true
  replicas: 1
  port: 4200
  resources: {}
  labels: {}
  annotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  env: []            # additional env vars
  extraVolumes: []       # additional volumes
  extraVolumeMounts: []  # additional volume mounts

# MCP Gateway configuration
mcpGateway:
  enabled: true
  replicas: 1
  port: 8080
  debugPort: 9090
  apiKey: ""
  resources: {}
  labels: {}
  annotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  env: []

# Database configuration
# Required.
database:
  secretName: "pg-credentials"
  # Whether to create the database credentials secret.
  # Set to false to use an existing secret (BYOS).
  create: true
  # Key name for password in the secret
  passwordKey: "MAESTRO_DB_PASSWORD"
  # PostgreSQL hostname.
  # Required.
  host: ""
  # PostgreSQL port.
  port: 5432
  # PostgreSQL database name.
  name: "maestro"
  # PostgreSQL username.
  username: "maestro"
  # PostgreSQL password (only used when create: true).
  password: ""
  # SSL mode for PostgreSQL connection.
  sslMode: "require"

# Ingress configuration
ingress:
  enabled: false
  className: ""
  host: ""
  annotations: {}
  tls: []

# Service account configuration
serviceAccount:
  create: true
  name: ""
  annotations: {}

# Global settings
global:
  imagePullSecrets: []
  # Common environment variables to inject into all containers.
  env: []
  labels: {}
  annotations: {}
