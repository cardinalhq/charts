# Default values for maestro
# This is a YAML-formatted file.

nameOverride: ""
fullnameOverride: ""

# Unified image for all components (Maestro + MCP Gateway + UI SPA).
# Entrypoint selects which component to run.
image:
  repository: public.ecr.aws/cardinalhq.io/maestro
  tag: ""          # defaults to Chart.appVersion
  pullPolicy: IfNotPresent

# Maestro API server + UI configuration
maestro:
  enabled: true
  replicas: 1
  port: 4200
  resources:
    requests:
      cpu: 500m
      memory: 256Mi
    limits:
      memory: 512Mi
  labels: {}
  annotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  env: []            # additional env vars
  extraVolumes: []       # additional volumes
  extraVolumeMounts: []  # additional volume mounts

# MCP Gateway configuration
mcpGateway:
  enabled: true
  replicas: 1
  port: 8080
  debugPort: 9090
  apiKey: ""
  resources:
    requests:
      cpu: 500m
      memory: 128Mi
    limits:
      memory: 256Mi
  labels: {}
  annotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  env: []

# Database configuration
# Required.
database:
  secretName: "pg-credentials"
  # Whether to create the database credentials secret.
  # Set to false to use an existing secret (BYOS).
  create: true
  # Key name for password in the secret
  passwordKey: "MAESTRO_DB_PASSWORD"
  # PostgreSQL hostname.
  # Required.
  host: ""
  # PostgreSQL port.
  port: 5432
  # PostgreSQL database name.
  name: "maestro"
  # PostgreSQL username.
  username: "maestro"
  # PostgreSQL password (only used when create: true).
  password: ""
  # SSL mode for PostgreSQL connection.
  sslMode: "require"

# Ingress configuration
ingress:
  enabled: false
  className: ""
  host: ""
  annotations: {}
  tls: []

# Service account configuration
serviceAccount:
  create: true
  name: ""
  annotations: {}

# Wait-for-mcp-gateway init container image (used by the maestro deployment
# when mcpGateway.enabled is true). Pinned to the busybox:1.36 multi-arch
# manifest list digest so image pulls are reproducible while still resolving
# to the correct per-arch variant at pull time. Clear `digest` to use the
# floating tag, or override any field to point at a mirror.
waitContainer:
  image:
    repository: busybox
    tag: "1.36"
    digest: "sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662"
    pullPolicy: IfNotPresent

# Global settings
global:
  # Global resource configuration
  resources:
    # Whether to render resource limits and requests in deployments
    # Set to false to omit resource specifications entirely from rendered templates
    # Default: true
    enabled: true
  imagePullSecrets: []
  # Common environment variables to inject into all containers.
  env: []
  labels: {}
  annotations: {}
  # Pod-level securityContext applied to every workload by default.
  # Per-component overrides can be added at <component>.podSecurityContext
  # (component fields win, missing fields fall back to these globals).
  # For OpenShift's restricted-v2 SCC, set this to {runAsNonRoot: true} (or
  # null the UID/fsGroup fields individually) so the SCC can inject values
  # from the namespace's assigned UID range.
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
  # Container-level securityContext applied to every container by default.
  # Per-component overrides can be added at <component>.containerSecurityContext.
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
