{{- if .Values.metrics.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "flamethrower.fullname" . }}
  labels:
    {{- include "flamethrower.labels" . | nindent 4 }}
    {{- with .Values.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels: {{- include "flamethrower.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: control
      path: /metrics
      interval: {{ .Values.metrics.serviceMonitor.interval }}
{{- end }}
