---
# Source: flamethrower/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flamethrower-flood-flamethrower
  labels:
    app.kubernetes.io/name: flamethrower
    app.kubernetes.io/instance: flamethrower-flood
    app.kubernetes.io/component: load-generator
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flamethrower
      app.kubernetes.io/instance: flamethrower-flood
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flamethrower
        app.kubernetes.io/instance: flamethrower-flood
    spec:
      serviceAccountName: flamethrower-flood
      containers:
        - name: flamethrower
          image: public.ecr.aws/cardinalhq.io/flamethrower:0.2.0
          imagePullPolicy: IfNotPresent
          args:
            - loggen
            - --style=k8s-filelog
            - --rate=1
            - --max-batch=10000
            - --concurrency=10
            - --s3-path=s3://test-bucket/otel-raw/00000000-0000-0000-0000-000000000000/test
            - --control-addr=:8080
          env:
            - name: AWS_REGION
              value: "us-east-2"
            - name: AWS_ENDPOINT_URL_S3
              value: "http://ceph.kubepi:7480"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: flamethrower-creds
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: flamethrower-creds
                  key: AWS_SECRET_ACCESS_KEY
          ports:
            - name: control
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: control
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: control
            periodSeconds: 5
          resources:
            limits:
              cpu: 2000m
              memory: 1Gi
            requests:
              cpu: 500m
              memory: 256Mi
