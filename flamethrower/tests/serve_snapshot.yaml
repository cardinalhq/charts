---
# Source: flamethrower/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flamethrower-flood-flamethrower
  labels:
    app.kubernetes.io/name: flamethrower
    app.kubernetes.io/instance: flamethrower-flood
    app.kubernetes.io/component: load-generator
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flamethrower
      app.kubernetes.io/instance: flamethrower-flood
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flamethrower
        app.kubernetes.io/instance: flamethrower-flood
    spec:
      serviceAccountName: flamethrower-flood
      containers:
        - name: flamethrower
          image: public.ecr.aws/cardinalhq.io/flamethrower:0.2.0
          imagePullPolicy: IfNotPresent
          args:
            - serve
            - --destinations=/etc/flamethrower/destinations.yaml
            - --max-duration=1h
            - --control-addr=:8080
          env:
            - name: AWS_REGION
              value: "us-east-2"
            - name: FLAMETHROWER_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: flamethrower-flood-flamethrower-auth
                  key: FLAMETHROWER_AUTH_TOKEN
          ports:
            - name: control
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: control
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: control
            periodSeconds: 5
          resources:
            limits:
              cpu: 2000m
              memory: 1Gi
            requests:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: destinations
              mountPath: /etc/flamethrower
              readOnly: true
      volumes:
        - name: destinations
          configMap:
            name: flamethrower-flood-flamethrower-destinations
