# Legacy lakerunner@3.13.6 install values, wired to the EXTERNAL postgres+rustfs
# fixtures (05-fixtures.yaml). Provisions a legacy org via storageProfiles +
# apiKeys (the pre-conductor way). After uninstall, configdb retains this org's
# organizations / organization_buckets rows, which conductor adopts.

global:
  resources:
    enabled: false
  autoscaling:
    mode: disabled

license:
  create: false
  secretName: "cardinal-license"

database:
  create: false
  secretName: "pg-credentials"
  passwordKey: "LRDB_PASSWORD"
  lrdb:
    host: "postgres"
    port: 5432
    name: "lakerunner"
    username: "lakerunner"
    sslMode: "disable"

configdb:
  create: false
  secretName: "pg-credentials"
  passwordKey: "CONFIGDB_PASSWORD"
  lrdb:
    host: "postgres"
    port: 5432
    name: "configdb"
    username: "config"
    sslMode: "disable"

cloudProvider:
  provider: "aws"
  aws:
    region: "us-east-1"
    # Shared aws-credentials secret is created by 05-fixtures.yaml so both
    # legacy charts (and conductor) reference the same secret.
    create: false
    secretName: "aws-credentials"
    inject: true

storageProfiles:
  source: config
  create: true
  yaml:
    - organization_id: "22222222-2222-2222-2222-222222222222"
      instance_num: 1
      collector_name: "legacy"
      cloud_provider: "aws"
      region: "us-east-1"
      bucket: "lakerunner"
      endpoint: "http://rustfs:9000"
      use_path_style: true
      insecure_tls: true

apiKeys:
  source: config
  create: true
  yaml:
    - organization_id: "22222222-2222-2222-2222-222222222222"
      keys:
        - "legacy-api-key-2222"

pubsub:
  HTTP:
    enabled: true
    replicas: 1

ha:
  enabled: false

grafana:
  enabled: false
